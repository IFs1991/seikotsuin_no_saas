name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# MVP Required Gates (CI-MVP-01 / CI-MVP-02 / CI-MVP-03)
#
#  quality            – lint / type-check / secret scan
#  build              – npm run build  (DOD-10)
#  supabase-contract  – validates src/types/supabase.ts header  (DOD-12)
#  fixture-preflight  – static fixture UUID/email checks  (DOD-05)
#  focused-regression – PR-05 9-suite focused Jest  (DOD-11)
#
# Deferred (not required merge gate):
#  test-security      – continue-on-error: true
#  Playwright         – blocked by spawn EPERM on Windows; see DOD-06/DOD-07
# ---------------------------------------------------------------------------

jobs:
  # --------------------------------------------------------------------------
  # 1. Quality: lint / type-check / secret scan
  # --------------------------------------------------------------------------
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Secret scan
        run: npm run scan:secrets

  # --------------------------------------------------------------------------
  # 2. Build  (DOD-10)
  # NEXT_PUBLIC_* vars are inlined at build time; placeholder values are
  # sufficient for build verification. Replace with repository secrets once
  # the project is connected to a real Supabase project.
  # --------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Next.js build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          # src/lib/env.ts requires this at module load during page-data
          # collection. The build never uses the real key, so a placeholder
          # is sufficient (least privilege: do not pass the real secret).
          SUPABASE_SERVICE_ROLE_KEY: 'placeholder-service-role-key'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          NEXT_PUBLIC_APP_ENV: 'ci'
          NEXT_PUBLIC_ENABLE_ADMIN_FEATURES: 'true'
          NEXT_PUBLIC_ENABLE_AI_INSIGHTS: 'false'
          NEXT_PUBLIC_ENABLE_CHAT: 'false'
          NEXT_PUBLIC_MAX_CLINICS: '10'
          NEXT_PUBLIC_GEMINI_MODEL: 'gemini-1.5-flash'
          NEXT_PUBLIC_CLINIC_GROUP_NAME: 'CI'
          NEXT_PUBLIC_DEFAULT_TIMEZONE: 'Asia/Tokyo'

  # --------------------------------------------------------------------------
  # 3. Supabase Types Contract  (DOD-12)
  # Validates that the committed src/types/supabase.ts starts with the
  # expected header. No Supabase CLI or local stack required.
  # Full regeneration via `npm run supabase:types` is a follow-up task once
  # a Supabase runner strategy is established.
  # --------------------------------------------------------------------------
  supabase-contract:
    name: Supabase Types Contract
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate supabase.ts header
        run: |
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('src/types/supabase.ts', 'utf8');
            const firstLine = content.split('\n')[0].trim();
            if (firstLine !== 'export type Json =') {
              console.error('FAIL: supabase.ts first line is: ' + JSON.stringify(firstLine));
              process.exit(1);
            }
            console.log('OK: supabase.ts header is valid');
          "

  # --------------------------------------------------------------------------
  # 4. Fixture Preflight – static checks only  (DOD-05)
  # Validates UUID format, uniqueness, and email uniqueness in fixture
  # definitions. DB connectivity check is skipped (E2E_SKIP_DB_CHECK=1).
  # DB-connected preflight can be enabled in a scheduled/nightly job once
  # secrets strategy is finalised.
  # --------------------------------------------------------------------------
  fixture-preflight:
    name: Fixture Preflight (Static)
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate E2E fixtures (static only)
        run: npm run e2e:validate-fixtures
        env:
          E2E_SKIP_DB_CHECK: '1'

  # --------------------------------------------------------------------------
  # 5. Focused Regression – PR-05 9-suite set  (DOD-11)
  # Exact file list from DoD-verification-report-2026-03-15.md.
  # Full repo-wide Jest is deferred (cost too high; adopt in nightly/follow-up).
  # --------------------------------------------------------------------------
  focused-regression:
    name: Focused Regression (PR-05, 9 suites)
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run focused regression suite
        run: npm run test:pr05:focused

  # --------------------------------------------------------------------------
  # Security Tests — informational only, not a required merge gate for MVP.
  # continue-on-error: true keeps the gate green even if these tests fail.
  # Promote to required once the full test suite is stabilised.
  # --------------------------------------------------------------------------
  test-security:
    name: Security Tests (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security tests
        run: npm test -- --ci --testPathPattern="security|session-management"

      - name: Security test summary
        if: always()
        run: |
          echo "## Security Test Results" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ Informational only — not a required merge gate for MVP" >> $GITHUB_STEP_SUMMARY
