name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DO_NOT_TRACK: '1'
  SUPABASE_TELEMETRY_DISABLED: '1'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# MVP Required Gates (CI-MVP-01 / CI-MVP-02 / CI-MVP-03)
#
#  quality            – lint / type-check / generated asset drift / secret scan
#  build              – npm run build  (DOD-10)
#  supabase-contract  – auxiliary generated-file corruption check  (DOD-12)
#  database-contract  – clean migration replay / pgTAP / complete type drift
#  fixture-preflight  – static fixture UUID/email checks  (DOD-05)
#  full-regression    – all non-E2E Jest suites  (DOD-11)
#  test-security      – security/session regression suites
#  app-e2e            – local Supabase fixture validation + Chromium smoke
# ---------------------------------------------------------------------------

jobs:
  # --------------------------------------------------------------------------
  # 1. Quality: lint / type-check / generated asset drift / secret scan
  # --------------------------------------------------------------------------
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Type check
        run: npm run type-check

      - name: Commercial boundary type check
        run: npm run type-check:commercial

      - name: Mobile UIUX production asset drift check
        run: npm run mobile-uiux:check-production-assets

      - name: Secret scan
        run: npm run scan:secrets

  # --------------------------------------------------------------------------
  # 2. Build  (DOD-10)
  # NEXT_PUBLIC_* vars are inlined at build time; placeholder values are
  # sufficient for build verification. Replace with repository secrets once
  # the project is connected to a real Supabase project.
  # --------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Next.js build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
          # src/lib/env.ts requires this at module load during page-data
          # collection. The build never uses the real key, so a placeholder
          # is sufficient (least privilege: do not pass the real secret).
          SUPABASE_SERVICE_ROLE_KEY: 'placeholder-service-role-key'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          NEXT_PUBLIC_APP_ENV: 'ci'
          NEXT_PUBLIC_ENABLE_ADMIN_FEATURES: 'true'
          NEXT_PUBLIC_ENABLE_AI_INSIGHTS: 'false'
          NEXT_PUBLIC_ENABLE_CHAT: 'false'
          NEXT_PUBLIC_MAX_CLINICS: '10'
          NEXT_PUBLIC_GEMINI_MODEL: 'gemini-1.5-flash'
          NEXT_PUBLIC_CLINIC_GROUP_NAME: 'CI'
          NEXT_PUBLIC_DEFAULT_TIMEZONE: 'Asia/Tokyo'

  # --------------------------------------------------------------------------
  # 3. Supabase Types Contract  (DOD-12, auxiliary)
  # Retained during the branch-protection transition so the existing required
  # check context does not become permanently pending. Database Contract is
  # the authoritative schema/type drift gate.
  # --------------------------------------------------------------------------
  supabase-contract:
    name: Supabase Types Contract
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate supabase.ts header
        run: |
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('src/types/supabase.ts', 'utf8');
            const firstLine = content.split('\n')[0].trim();
            if (firstLine !== 'export type Json =') {
              console.error('FAIL: supabase.ts first line is: ' + JSON.stringify(firstLine));
              process.exit(1);
            }
            console.log('OK: supabase.ts header is valid');
          "

  # --------------------------------------------------------------------------
  # 4. Database Contract – clean replay / pgTAP / generated type drift
  # --------------------------------------------------------------------------
  database-contract:
    name: Database Contract
    runs-on: ubuntu-latest
    needs: [quality]
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read pinned Supabase CLI version
        id: supabase-cli-version
        shell: bash
        run: echo "version=$(node scripts/verify-supabase-cli-version.mjs --print)" >> "$GITHUB_OUTPUT"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: ${{ steps.supabase-cli-version.outputs.version }}

      - name: Verify pinned Supabase CLI
        run: npm run supabase:cli:verify

      - name: Verify applied migration history is immutable
        run: npm run commercial:verify:migrations

      - name: Start local Supabase
        run: supabase start

      - name: Replay all migrations and seed from zero
        run: supabase db reset --local

      - name: Run database contract tests
        run: supabase test db --local

      - name: Verify generated Supabase types are current
        run: |
          npm run supabase:types
          git diff --exit-code -- src/types/supabase.ts

  # --------------------------------------------------------------------------
  # 5. Fixture Preflight – static checks only  (DOD-05)
  # Validates UUID format, uniqueness, and email uniqueness in fixture
  # definitions. DB connectivity check is skipped (E2E_SKIP_DB_CHECK=1).
  # DB-connected preflight can be enabled in a scheduled/nightly job once
  # secrets strategy is finalised.
  # --------------------------------------------------------------------------
  fixture-preflight:
    name: Fixture Preflight (Static)
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate E2E fixtures (static only)
        run: npm run e2e:validate-fixtures
        env:
          E2E_SKIP_DB_CHECK: '1'

  # --------------------------------------------------------------------------
  # 6. Full Regression (DOD-11)
  # --------------------------------------------------------------------------
  full-regression:
    name: Full Jest Regression
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full non-E2E regression suite
        run: npm run test -- --ci --testPathIgnorePatterns=e2e

  # --------------------------------------------------------------------------
  # Security Tests — required merge gate.
  # --------------------------------------------------------------------------
  test-security:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security tests
        run: npm test -- --ci --testPathPattern="security|session-management"

      - name: Security test summary
        if: always()
        run: |
          echo "## Security Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Required security/session regression gate" >> $GITHUB_STEP_SUMMARY

  # --------------------------------------------------------------------------
  # App E2E — real local Supabase, DB fixture validation, and Chromium smoke.
  # Cross-tenant RLS enforcement remains blocked on the separately approved
  # migration remediation and is intentionally not represented as green here.
  # --------------------------------------------------------------------------
  app-e2e:
    name: App E2E (Local Supabase + Chromium)
    runs-on: ubuntu-latest
    needs: [quality, database-contract]
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read pinned Supabase CLI version
        id: supabase-cli-version
        shell: bash
        run: echo "version=$(node scripts/verify-supabase-cli-version.mjs --print)" >> "$GITHUB_OUTPUT"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: ${{ steps.supabase-cli-version.outputs.version }}

      - name: Verify pinned Supabase CLI
        run: npm run supabase:cli:verify

      - name: Start local Supabase
        run: supabase start

      - name: Export local test environment
        run: |
          supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_APP_URL=http://127.0.0.1:3000" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_APP_ENV=e2e" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_E2E=true" >> "$GITHUB_ENV"

      - name: Validate database fixtures
        run: npm run e2e:validate-fixtures

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run application smoke flows
        run: >-
          npm run test:e2e:pw --
          src/__tests__/e2e-playwright/auth-login-flow.spec.ts
          src/__tests__/e2e-playwright/happy-path.spec.ts
          src/__tests__/e2e-playwright/public-menus-api.spec.ts
          --project=chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
