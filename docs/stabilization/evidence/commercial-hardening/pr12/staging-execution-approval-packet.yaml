    - public is the only proposed exposed Data API schema; graphql_public is not proposed
    - automatic exposure is disabled and explicit grants remain separate from RLS
    - pg_graphql and introspection are disabled proposals whose actual installed/enabled states must be captured
    - restore-to-new-project is paid-plan database-centered and requires post-restore reconfiguration/side-effect review
    - Large is 2-core ARM dedicated, 8 GB, USD 0.1517 per project-hour before organization-specific credit
    - create-project requires db_pass/name/organization_slug; organization_id, plan, and region are deprecated or ignored and are forbidden by the Phase 1 wrapper
    - Pro is an existing organization entitlement and is not changed by the Phase 1 POST
    - Data API, GraphQL, Auth, and integration posture cannot be configured or proven by the Phase 1 create-project POST
    - the documented create-project endpoint exposes no idempotency key; Phase 1 permits at most one POST attempt and no blind retry
